name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt --dry-run
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check app main.py tests scripts

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  pack-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt --dry-run
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Publish script DryRun (version parse smoke)
        run: .\scripts\publish_windows_release.ps1 -DryRun

      - name: Build with PyInstaller
        run: .\scripts\build_exe.ps1

      - name: Velopack pack
        run: .\scripts\velopack_pack.ps1

      - name: Verify release artifacts
        run: .\scripts\verify_windows_release_artifacts.ps1 -ReleaseDir "release\velopack"
